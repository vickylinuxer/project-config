# AOSP component pipeline template
# For standalone Android HAL module or system component builds
# Paths are relative to workspace — resolved automatically by pipeliner
mode: component

# Build scripts repo — pipeliner clones this before build
buildScripts:
  url: https://git.example.com/org/build-scripts.git
  branch: main

project:
  name: my-android-module       # project directory name under subsystems/
  repoUrl: https://git.example.com/org/my-android-module.git
  type: aosp
  buildType: ci                 # ci | nightly | release

environment:
  agent: "linux docker x86_64"
  timeout: 60
  docker:
    image: trialyq2ase.jfrog.io/docker-local/aosp-builder:latest
    credentialId: artifactory-creds

aosp:
  buildScript: build-scripts/integration/aosp-build.sh

# Git adapter for build status notifications
git:
  type: bitbucket
  url: https://bitbucket.org
  credentialId: git-creds

stages:
  - checkout
  - build
  - notify

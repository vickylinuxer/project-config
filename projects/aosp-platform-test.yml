project:
  name: aosp-platform-test
  type: aosp
  buildType: ci

environment:
  agent: "linux docker x86_64"
  timeout: 720
  docker:
    image: aosp-builder:latest
    args: "-v /mnt/workspace:/mnt/workspace -v /mnt/aosp:/mnt/aosp"

aosp:
  sourceDir: /mnt/aosp
  target: rpi4-ap3a-userdebug
  jobs: 4
  ccacheDir: /mnt/workspace/cache/aosp/ccache
  ccacheSize: 50G

stages:
  - checkout
  - build
  - notify

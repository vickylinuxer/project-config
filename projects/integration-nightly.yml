mode: integration

project:
  name: integration-build
  type: custom
  buildType: nightly

workspace: /var/jenkins/workspace/integration
cleanWorkspace: true

environment:
  agent: "audioi-linux"
  timeout: 720
  minDiskGB: 50

manifest:
  url: http://forgejo:3000/audioi/integration-manifest.git
  branch: main
  reference: /mnt/workspace/mirrors/reference

artifacts:
  type: artifactory
  url: https://trialyq2ase.jfrog.io
  credentialId: artifactory-creds
  defaultRepo: test

stages: [checkout, build, publish, notify]
failFast: true

subsystems:
  - custom-firmware-nightly
  - yocto-bsp-nightly
  - aosp-platform-nightly
